<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gatekeeper Verification</title>
</head>
<body style="margin: 0; padding: 0; width: 100%; background-color: #334155; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;">

<table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="background-color: #334155;">
    <tr>
        <td align="center" style="padding: 40px 20px;">

            <table role="presentation" width="100%" max-width="500" cellspacing="0" cellpadding="0" border="0" style="max-width: 500px; width: 100%; background-color: #e2e8f0; border: 1px solid #cbd5e1; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);">
                <tr>
                    <td style="padding: 30px #f8fafc; padding: 30px 40px;">

                        <h1 style="margin: 0 0 16px 0; color: #4338ca; font-size: 28px; font-weight: 600; text-align: center; line-height: 1.3;">
                            Welcome to Gatekeeper!
                        </h1>

                        <p style="margin: 0 0 24px 0; color: #334155; font-size: 16px; line-height: 1.5; text-align: left;">
                            Thank you for joining us. Please use the verification code below to activate your account.
                        </p>

                        <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="margin-bottom: 24px;">
                            <tr>
                                <td align="center" bgcolor="#bfdbfe" style="padding: 16px; border-radius: 16px; background-color: #bfdbfe;">
                                        <span th:text="${code}"
                                              style="font-size: 28px; font-weight: 700; color: #1e3a8a; letter-spacing: 4px; font-family: 'Courier New', Courier, monospace;"></span>
                                </td>
                            </tr>
                        </table>

                        <p style="margin: 0; color: #64748b; font-size: 14px; text-align: center; line-height: 1.4;">
                            The code will expire in 15 minutes.
                        </p>

                    </td>
                </tr>
            </table>

        </td>
    </tr>
</table>

</body>
</html>
