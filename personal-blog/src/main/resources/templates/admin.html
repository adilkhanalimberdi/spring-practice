<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <title>Admin Panel</title>
</head>
<body class="m-0 p-10 text-gray-900 flex items-center justify-center">

    <div class="flex flex-col gap-10 max-w-5xl w-full">
        <div class="flex flex-row items-center justify-between w-full">
            <p class="text-3xl text-black font-semibold">Personal Blog</p>

            <a th:href="@{/new}"
               class="text-blue-600 hover:text-blue-800">+ Add</a>
        </div>

        <div class="flex flex-col gap-5 w-full">
            <div th:if="${#lists.isEmpty(articles)}" class="p-25 flex items-center justify-center border border-gray-300 rounded-md shadow-sm">
                <p class="text-gray-600">There are no blogs yet.</p>
            </div>

            <div th:each="article : ${articles}" th:object="${article}" class="flex flex-row items-center justify-between w-full">
                <div class="w-2/3">
                    <a th:href="@{/article/{id}(id=*{id})}"
                       th:text="*{title}"
                       class="text-xl hover:text-blue-500 hover:underline"></a>
                </div>

                <div class="w-1/3 flex flex-row gap-3 justify-end">
                    <a th:href="@{/edit/{id}(id=*{id})}"
                       class="px-3 py-1 text-blue-600 hover:text-blue-800 hover:bg-blue-200 rounded-md transition-all duration-200 text-center">
                        Edit
                    </a>

                    <form th:action="@{/delete/{id}(id=*{id})}" method="post">
                        <input type="hidden" name="redirectUrl" id="redirect-input">

                        <button type="submit"
                                onclick="document.getElementById('redirect-input').value = window.location.pathname"
                                class="px-3 py-1 text-red-600 hover:text-red-800 hover:bg-red-200 rounded-md transition-all duration-200 text-center">
                            Delete
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
