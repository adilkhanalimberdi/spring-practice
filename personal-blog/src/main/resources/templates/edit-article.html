<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <title>Update an existing Article</title>
</head>
<body class="m-0 p-10 text-gray-900 flex items-center justify-center">

<div class="flex flex-col gap-10 max-w-5xl w-full">
    <p class="text-3xl text-black font-semibold">Update Article</p>

    <form th:action="@{/edit/{id}(id=${article.id})}" th:object="${article}" method="post" class="w-full flex flex-col gap-5 justify-start">
        <div class="flex flex-col gap-1 w-full">
            <label for="title">Article Title</label>
            <input type="text"
                   id="title"
                   th:field="*{{title}}"
                   placeholder="Enter article title..."
                   class="px-5 py-3 rounded-md w-full border border-gray-400"
                   required>
        </div>

        <div class="flex flex-col gap-1 w-full">
            <label for="date">Publishing Date</label>
            <input type="date"
                   id="date"
                   th:value="*{createdAt}"
                   placeholder="yyy-MM-dd"
                   class="px-5 py-3 rounded-md w-full border border-gray-400"
                   disabled>
        </div>

        <div class="flex flex-col gap-1 w-full">
            <label for="content">Content</label>
            <textarea id="content"
                      th:field="*{content}"
                      cols="30" rows="10"
                      class="px-5 py-3 rounded-md w-full border border-gray-400 resize-y min-h-37.5 max-h-125"
                      placeholder="Enter content..."
                      required></textarea>
        </div>

        <div class="w-full">
            <button class="rounded-md bg-blue-600 text-white px-8 py-3 hover:bg-blue-700 active:bg-blue-800 shrink-0 no-wrap overflow-hidden transition-all duration-200">
                Update</button>
        </div>
    </form>
</div>

</body>
</html>
