<div xmlns:th="http://www.thymeleaf.org"
     class="max-md:hidden transition-all duration-300"
     id="menu-container"
     th:fragment="nav">
    <div class="py-5 grid gap-5 select-none"
         style="grid-template-columns: repeat(auto-fill, minmax(150px, 1fr))">
        <a th:href="@{/(type=length)}"
           class="flex items-center justify-center text-center p-6 text-base font-medium text-gray-700 bg-white border border-slate-200 rounded-xl shadow-sm hover:shadow-xl hover:border-slate-300 hover:-translate-y-1 hover:scale-[1.02] transition-all duration-300 ease-out">
            Length
        </a>

        <a th:href="@{/(type=weight)}"
           class="flex items-center justify-center text-center p-6 text-base font-medium text-gray-700 bg-white border border-slate-200 rounded-xl shadow-sm hover:shadow-xl hover:border-slate-300 hover:-translate-y-1 hover:scale-[1.02] transition-all duration-300 ease-out">
            Weight
        </a>

        <a th:href="@{/(type=temp)}"
           class="flex items-center justify-center text-center p-6 text-base font-medium text-gray-700 bg-white border border-slate-200 rounded-xl shadow-sm hover:shadow-xl hover:border-slate-300 hover:-translate-y-1 hover:scale-[1.02] transition-all duration-300 ease-out">
            Temperature
        </a>

        <a th:href="@{/(type=area)}"
           class="flex items-center justify-center text-center p-6 text-base font-medium text-gray-700 bg-white border border-slate-200 rounded-xl shadow-sm hover:shadow-xl hover:border-slate-300 hover:-translate-y-1 hover:scale-[1.02] transition-all duration-300 ease-out">
            Area
        </a>

        <a th:href="@{/(type=volume)}"
           class="flex items-center justify-center text-center p-6 text-base font-medium text-gray-700 bg-white border border-slate-200 rounded-xl shadow-sm hover:shadow-xl hover:border-slate-300 hover:-translate-y-1 hover:scale-[1.02] transition-all duration-300 ease-out">
            Volume
        </a>

        <a th:href="@{/(type=time)}"
           class="flex items-center justify-center text-center p-6 text-base font-medium text-gray-700 bg-white border border-slate-200 rounded-xl shadow-sm hover:shadow-xl hover:border-slate-300 hover:-translate-y-1 hover:scale-[1.02] transition-all duration-300 ease-out">
            Time
        </a>
    </div>
</div>
